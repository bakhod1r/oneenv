name: Pages

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      # The changelog has a single source of truth at the repo root; the docs
      # page is generated from it at build time so the two cannot drift.
      - name: Generate changelog page
        run: |
          {
            printf -- '---\ntitle: Changelog\nlayout: default\nnav_order: 13\n---\n\n'
            tail -n +2 CHANGELOG.md
          } > docs/changelog.md

      - uses: actions/configure-pages@v5
      - uses: actions/jekyll-build-pages@v1
        with:
          source: ./docs
          destination: ./_site
      - uses: actions/upload-pages-artifact@v3

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - id: deployment
        uses: actions/deploy-pages@v4
