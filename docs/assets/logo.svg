<svg width="600" height="200" viewBox="0 0 600 200" fill="none" xmlns="http://www.w3.org/2000/svg" role="img" aria-label="oneenv logo">
  <defs>
    <linearGradient id="mark" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#22D3EE"/>
      <stop offset="0.55" stop-color="#00ADD8"/>
      <stop offset="1" stop-color="#0E7490"/>
    </linearGradient>
    <linearGradient id="sheen" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#ffffff" stop-opacity="0.28"/>
      <stop offset="0.5" stop-color="#ffffff" stop-opacity="0"/>
    </linearGradient>
  </defs>

  <!-- Premium mark: a single node resolving into a container ( one → env ) -->
  <g transform="translate(28,26)">
    <rect x="0" y="0" width="148" height="148" rx="38" fill="url(#mark)"/>
    <rect x="0" y="0" width="148" height="148" rx="38" fill="url(#sheen)"/>
    <rect x="1.5" y="1.5" width="145" height="145" rx="36.5" fill="none" stroke="#ffffff" stroke-opacity="0.18" stroke-width="3"/>

    <!-- container brackets (env / struct) -->
    <path d="M56 44 h-14 a12 12 0 0 0 -12 12 v18" fill="none" stroke="#ffffff" stroke-width="9" stroke-linecap="round"/>
    <path d="M30 90 v18 a12 12 0 0 0 12 12 h14" fill="none" stroke="#ffffff" stroke-width="9" stroke-linecap="round"/>
    <path d="M92 44 h14 a12 12 0 0 1 12 12 v18" fill="none" stroke="#ffffff" stroke-width="9" stroke-linecap="round"/>
    <path d="M118 90 v18 a12 12 0 0 1 -12 12 h-14" fill="none" stroke="#ffffff" stroke-width="9" stroke-linecap="round"/>

    <!-- the single "one" node -->
    <circle cx="74" cy="82" r="15" fill="#ffffff"/>
    <circle cx="74" cy="82" r="15" fill="none" stroke="#0E7490" stroke-opacity="0.12" stroke-width="2"/>
  </g>

  <!-- Wordmark -->
  <g transform="translate(202,0)">
    <text x="0" y="118" font-family="'Inter','SF Pro Display',system-ui,sans-serif" font-size="62" font-weight="800" letter-spacing="-2" fill="#0B1F24">one<tspan fill="#00ADD8">env</tspan></text>
  </g>
</svg>
